<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LPG Quality Monitor — IoT Dashboard</title>

  <script type="module">
    // Config diimport dari file terpisah (ada di .gitignore)
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── Status koneksi ──────────────────────────────────────────
    const connRef = ref(db, '.info/connected');
    onValue(connRef, (snap) => {
      const badge = document.getElementById('conn-badge');
      if (snap.val() === true) {
        badge.textContent = '● LIVE';
        badge.className   = 'badge badge-live';
      } else {
        badge.textContent = '○ OFFLINE';
        badge.className   = 'badge badge-offline';
      }
    });

    // ── Listen /live realtime ───────────────────────────────────
    const liveRef = ref(db, '/live');
    onValue(liveRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      // Nilai kartu
      document.getElementById('val-berat').textContent  = Number(data.berat    ?? 0).toFixed(2);
      document.getElementById('val-ppm').textContent    = Number(data.ppm      ?? 0).toFixed(0);
      document.getElementById('val-suhu').textContent   = Number(data.suhu     ?? 0).toFixed(1);
      document.getElementById('val-humid').textContent  = Number(data.humidity ?? 0).toFixed(0);
      document.getElementById('val-isi').textContent    = Number(data.isi      ?? 0).toFixed(2);

      // Bar PPM (skala 0–1000 ppm → 0–100%)
      const ppm = Number(data.ppm ?? 0);
      const pct = Math.min(100, Math.round(ppm / 10));
      document.getElementById('ppm-bar').style.width      = pct + '%';
      document.getElementById('ppm-bar').style.background = getPPMColor(ppm);
      document.getElementById('ppm-pct').textContent      = pct + '%';

      // Indikator status (ikuti logika Arduino)
      updateStatus(ppm, Number(data.berat ?? 0));

      // Timestamp
      if (data.timestamp) {
        const dt = new Date(data.timestamp);
        document.getElementById('ts-label').textContent =
          'Update: ' + dt.toLocaleTimeString('id-ID');
      }

      // Animasi flash
      ['val-berat','val-ppm','val-suhu','val-humid','val-isi'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('flash');
        void el.offsetWidth;
        el.classList.add('flash');
      });
    });

    // ── Logika status sesuai Arduino ───────────────────────────
    // gasGlobal > 300 → BOCOR (prioritas tertinggi)
    // berat ≥ 7.80    → LAYAK
    // berat ≥ 4.80    → KURANG
    // else            → KOSONG
    function updateStatus(ppm, berat) {
      const row  = document.getElementById('status-row');
      const dot  = document.getElementById('status-dot');
      const text = document.getElementById('status-text');

      let cls, dotCls, label;

      if (ppm > 300) {
        cls    = 'status-bocor';
        dotCls = 'dot-bocor';
        label  = '🔴 BOCOR — Gas Terdeteksi! Jauhkan dari Api!';
      } else if (berat >= 7.80) {
        cls    = 'status-layak';
        dotCls = 'dot-layak';
        label  = 'LAYAK — Tabung Penuh / Cukup';
      } else if (berat >= 4.80) {
        cls    = 'status-kurang';
        dotCls = 'dot-kurang';
        label  = 'KURANG — Sisa Gas Menipis';
      } else {
        cls    = 'status-kosong';
        dotCls = 'dot-kosong';
        label  = 'KOSONG — Tabung Habis / Tidak Ada';
      }

      row.className  = 'status-row ' + cls;
      dot.className  = 'status-dot ' + dotCls;
      text.textContent = label;
    }

    function getPPMColor(ppm) {
      if (ppm <= 300) return '#22c55e';
      if (ppm <= 600) return '#f59e0b';
      return '#ef4444';
    }

    window._firebaseDB  = db;
    window._firebaseRef = ref;
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  rgba(255,255,255,0.08);
      --text:    #e8eaf0;
      --muted:   #8b90a0;
      /* status colors */
      --layak:   #22c55e;
      --kurang:  #f59e0b;
      --bocor:   #ef4444;
      --kosong:  #6b7280;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 800px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .site-title { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.5px; }
    .site-title span { color: var(--layak); }

    .badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 99px;
      border: 1px solid;
    }
    .badge-live    { background: rgba(34,197,94,0.15);  color: var(--layak); border-color: rgba(34,197,94,0.3); }
    .badge-offline { background: rgba(239,68,68,0.15);  color: var(--bocor); border-color: rgba(239,68,68,0.3); }

    /* ── Kartu Sensor ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
    }

    .card-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .card-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2rem;
      font-weight: 600;
      line-height: 1;
    }

    .card-unit { font-size: 12px; color: var(--muted); margin-top: 6px; }

    /* ── Bar PPM ── */
    .ppm-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .ppm-header {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .ppm-track {
      height: 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }

    .ppm-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s ease, background 0.5s;
    }

    .ppm-scale {
      display: flex;
      justify-content: space-between;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Status ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid;
      margin-bottom: 1.5rem;
      transition: all 0.4s;
    }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text { font-size: 14px; font-weight: 600; }

    /* Status: LAYAK */
    .status-layak  { background: rgba(34,197,94,0.1);  border-color: rgba(34,197,94,0.3);  }
    .status-layak  .status-text { color: var(--layak);  }
    .dot-layak     { background: var(--layak);  }

    /* Status: KURANG */
    .status-kurang { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); }
    .status-kurang .status-text { color: var(--kurang); }
    .dot-kurang    { background: var(--kurang); }

    /* Status: BOCOR — merah + berkedip lebih cepat */
    .status-bocor  { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.5);  }
    .status-bocor  .status-text { color: var(--bocor);  }
    .dot-bocor     { background: var(--bocor); animation-duration: 0.6s; }

    /* Status: KOSONG */
    .status-kosong { background: rgba(107,114,128,0.1); border-color: rgba(107,114,128,0.3); }
    .status-kosong .status-text { color: var(--kosong); }
    .dot-kosong    { background: var(--kosong); }

    /* ── Footer ── */
    .footer {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    /* ── Flash animation ── */
    .flash { animation: flashIn 0.4s ease; }
    @keyframes flashIn {
      0%   { opacity: 0.3; transform: scale(0.97); }
      100% { opacity: 1;   transform: scale(1); }
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr 1fr; }
      .card-value { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="site-title">LPG <span>Quality</span> Monitor</div>
      <div class="badge badge-offline" id="conn-badge">○ CONNECTING...</div>
    </div>

    <!-- Kartu Sensor — 5 kartu: tambah Berat Isi -->
    <div class="grid">
      <div class="card">
        <div class="card-label">Berat Total</div>
        <div class="card-value" id="val-berat">—</div>
        <div class="card-unit">kg (tabung + isi)</div>
      </div>
      <div class="card">
        <div class="card-label">Berat Isi</div>
        <div class="card-value" id="val-isi">—</div>
        <div class="card-unit">kg (isi LPG)</div>
      </div>
      <div class="card">
        <div class="card-label">Gas (PPM)</div>
        <div class="card-value" id="val-ppm">—</div>
        <div class="card-unit">ppm (MQ sensor)</div>
      </div>
      <div class="card">
        <div class="card-label">Suhu</div>
        <div class="card-value" id="val-suhu">—</div>
        <div class="card-unit">°C</div>
      </div>
      <div class="card">
        <div class="card-label">Kelembapan</div>
        <div class="card-value" id="val-humid">—</div>
        <div class="card-unit">%RH</div>
      </div>
    </div>

    <!-- Bar Level PPM -->
    <div class="ppm-wrap">
      <div class="ppm-header">
        <span>Level Gas (PPM Sensor MQ)</span>
        <span id="ppm-pct">—</span>
      </div>
      <div class="ppm-track">
        <div class="ppm-fill" id="ppm-bar" style="width:0%"></div>
      </div>
      <div class="ppm-scale">
        <span>0</span>
        <span>300 — Bocor</span>
        <span>600</span>
        <span>1000</span>
      </div>
    </div>

    <!-- Indikator Status (4 status sesuai Arduino) -->
    <div class="status-row status-kosong" id="status-row">
      <div class="status-dot dot-kosong" id="status-dot"></div>
      <div class="status-text" id="status-text">Menunggu data dari sensor...</div>
    </div>

    <div class="footer">
      <span>device: ESP32-LPG-01</span>
      <span id="ts-label">— belum ada data —</span>
    </div>

  </div>
</body>
</html>
