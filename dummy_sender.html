<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Dummy Data Sender — Testing Firebase</title>
  <style>
    body { font-family: monospace; background: #0f1117; color: #e8eaf0; padding: 2rem; max-width: 600px; margin: 0 auto; }
    h2   { color: #22c55e; margin-bottom: 0.5rem; }
    p.sub { font-size: 12px; color: #8b90a0; margin-bottom: 1.5rem; }
    .box { background: #1a1d27; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 1.5rem; margin-bottom: 1rem; }
    .row { margin-bottom: 14px; }
    label { display: block; font-size: 12px; color: #8b90a0; margin-bottom: 4px; }
    input[type=range] { width: 100%; margin-bottom: 2px; }
    .val  { font-size: 1.1rem; color: #e8eaf0; font-weight: 600; }
    .btns { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      border: none; padding: 10px 18px; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: monospace;
    }
    .btn-live    { background: #22c55e; color: #000; }
    .btn-raw     { background: #3b82f6; color: #fff; }
    .btn-history { background: #a855f7; color: #fff; }
    .btn-auto    { background: #22c55e; color: #000; }
    button:hover { opacity: 0.85; }

    #log { font-size: 12px; color: #8b90a0; margin-top: 1rem; max-height: 180px; overflow-y: auto; }
    .err { color: #ef4444; }
    .ok  { color: #22c55e; }
    .info { color: #60a5fa; }
  </style>

  <script type="module">
    import { firebaseConfig } from './firebase-config.js';
    import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    function log(msg, cls = 'info') {
      const el = document.getElementById('log');
      el.innerHTML += `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }

    function getValues() {
      const berat = parseFloat(document.getElementById('r-berat').value);
      const ppm   = parseFloat(document.getElementById('r-ppm').value);
      const suhu  = parseFloat(document.getElementById('r-suhu').value);
      const humid = parseFloat(document.getElementById('r-humid').value);
      // Berat isi = berat total - 5kg (berat tabung kosong)
      const isi   = berat > 5 ? parseFloat((berat - 5).toFixed(2)) : 0;

      // Logika status persis seperti Arduino
      let status;
      if (ppm > 300)       status = 'BOCOR';
      else if (berat >= 7.80) status = 'LAYAK';
      else if (berat >= 4.80) status = 'KURANG';
      else                    status = 'KOSONG';

      return { berat, ppm, suhu, humidity: humid, isi, status };
    }

    // ── Kirim ke /live ──────────────────────────────────────────
    async function sendLive() {
      const data = { ...getValues(), timestamp: Date.now(), device_id: 'ESP32-LPG-01' };
      try {
        await set(ref(db, '/live'), data);
        log(`/live → berat=${data.berat}kg | ppm=${data.ppm} | status=${data.status}`, 'ok');
      } catch (e) { log('ERROR /live: ' + e.message, 'err'); }
    }

    // ── Kirim ke /raw ───────────────────────────────────────────
    async function sendRaw() {
      const data = { ...getValues(), timestamp: Date.now(), device_id: 'ESP32-LPG-01' };
      try {
        const key = '-Dummy' + Date.now();
        await set(ref(db, '/raw/' + key), data);
        log(`/raw → key=${key}`, 'ok');
      } catch (e) { log('ERROR /raw: ' + e.message, 'err'); }
    }

    // ── Kirim ke /history (simulasi rata-rata) ──────────────────
    async function sendHistory() {
      const v = getValues();
      const data = {
        id:           'HIST-' + Date.now(),
        berat_avg:    v.berat,
        isi_avg:      v.isi,
        ppm_avg:      v.ppm,
        ppm_max:      parseFloat((v.ppm + 20).toFixed(0)),
        ppm_min:      parseFloat((v.ppm - 20).toFixed(0)),
        suhu_avg:     v.suhu,
        humidity_avg: v.humidity,
        status:       v.status,
        sample_count: 10,
        timestamp:    Date.now(),
        device_id:    'ESP32-LPG-01'
      };
      try {
        const key = '-Hist' + Date.now();
        await set(ref(db, '/history/' + key), data);
        log(`/history → status=${data.status}`, 'ok');
      } catch (e) { log('ERROR /history: ' + e.message, 'err'); }
    }

    // ── Auto send ───────────────────────────────────────────────
    let autoInterval = null;
    function toggleAuto() {
      const btn = document.getElementById('btn-auto');
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
        btn.textContent  = '▶ Auto Send (5s)';
        btn.style.background = '#22c55e';
        btn.style.color  = '#000';
        log('Auto-send dihentikan.', 'info');
      } else {
        autoInterval = setInterval(() => sendLive(), 5000);
        btn.textContent  = '■ Stop Auto Send';
        btn.style.background = '#ef4444';
        btn.style.color  = '#fff';
        log('Auto-send aktif — kirim ke /live tiap 5 detik.', 'ok');
        sendLive();
      }
    }

    // Expose ke onclick
    window.sendLive    = sendLive;
    window.sendRaw     = sendRaw;
    window.sendHistory = sendHistory;
    window.toggleAuto  = toggleAuto;

    // Live update label slider
    ['berat','ppm','suhu','humid'].forEach(name => {
      const slider  = document.getElementById('r-' + name);
      const display = document.getElementById('v-' + name);
      const update  = () => {
        display.textContent = slider.value;
        // Update preview status saat slider bergerak
        const v = getValues();
        document.getElementById('preview-status').textContent = 'Status: ' + v.status + ' | Isi: ' + v.isi + 'kg';
      };
      slider.addEventListener('input', update);
      update();
    });

    log('Firebase terhubung. Siap kirim data.', 'ok');
  </script>
</head>
<body>
  <h2>Dummy Data Sender</h2>
  <p class="sub">Simulasi data ESP32 — testing dashboard tanpa hardware</p>

  <div class="box">
    <div class="row">
      <label>Berat Total (kg) — tabung + isi: <span class="val" id="v-berat">7.5</span></label>
      <input type="range" id="r-berat" min="0" max="12" step="0.1" value="7.5" />
    </div>
    <div class="row">
      <label>Gas PPM (MQ sensor): <span class="val" id="v-ppm">100</span></label>
      <input type="range" id="r-ppm" min="0" max="1000" step="10" value="100" />
    </div>
    <div class="row">
      <label>Suhu (°C): <span class="val" id="v-suhu">28.5</span></label>
      <input type="range" id="r-suhu" min="20" max="45" step="0.1" value="28.5" />
    </div>
    <div class="row">
      <label>Kelembapan (%): <span class="val" id="v-humid">65</span></label>
      <input type="range" id="r-humid" min="30" max="100" step="1" value="65" />
    </div>

    <!-- Preview status real-time -->
    <div style="font-size:12px;color:#a78bfa;margin-top:4px;" id="preview-status">Status: —</div>
  </div>

  <div class="btns">
    <button class="btn-live"    onclick="sendLive()">Kirim → /live</button>
    <button class="btn-raw"     onclick="sendRaw()">Kirim → /raw</button>
    <button class="btn-history" onclick="sendHistory()">Kirim → /history</button>
    <button class="btn-auto"    onclick="toggleAuto()" id="btn-auto">▶ Auto Send (5s)</button>
  </div>

  <div id="log"></div>
</body>
</html>
